name: Deploy Static Content to Pages

on:
  push:
    branches: ["main"] # Change to "master" if your default branch is named master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6 # Updated from v4

      - name: Setup Pages
        uses: actions/configure-pages@v6 # Updated from v5

      - name: Upload artifact
        uses: actions/upload-artifact@v4.4.0 # Patched version targeting newer Node runtimes
        with:
          path: 'public' # Points directly to your public folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
