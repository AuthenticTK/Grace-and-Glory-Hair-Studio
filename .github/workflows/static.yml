name: Deploy Static Content to Pages

on:
  push:
    branches: ["main"] # Change to "master" if your default branch is named master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      # FIX: Use the specific Pages upload action and point it to 'public'
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
